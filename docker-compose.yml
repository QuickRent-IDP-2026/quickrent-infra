version: '3.8'

services:
  # --- ZONE 3: DATABASE NETWORK ---
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: quickrent_db
    networks:
      - db-net
    volumes:
      - db_data:/var/lib/postgresql
    deploy:
      placement:
        constraints: [node.role == manager]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d quickrent_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-admin:
    image: adminer:latest
    ports:
      - "8080:8080"
    networks:
      - db-net
    deploy:
      placement:
        constraints: [node.role == manager]

  # --- ZONE 2: BACKEND NETWORK ---
  data-service:
    image: rrsmart8/quickrent-data:latest
    networks:
      - db-net       
      - backend-net
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/quickrent_db
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints: [node.role == manager]

  auth-service:
    image: rrsmart8/quickrent-auth:latest
    networks:
      - backend-net
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]

  logic-service:
    image: rrsmart8/quickrent-logic:latest
    networks:
      - backend-net
    environment:
      AUTH_SERVICE_URL: http://auth-service:8000
      DATA_SERVICE_URL: http://data-service:8000
    deploy:
      placement:
        constraints: [node.role == manager]

  # --- ZONE 1: PUBLIC NETWORK ---
  kong:
    image: kong:latest
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong.yml:/usr/local/kong/declarative/kong.yml
    networks:
      - public-net
      - backend-net
    deploy:
      placement:
        constraints: [node.role == manager]

  # --- ZONE 4: ADMIN & MONITORING ---
  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - admin-net
    deploy:
      placement:
        constraints: [node.role == manager]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ../quickrent-monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - admin-net
      - backend-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    deploy:
      placement:
        constraints: [node.role == manager]

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    networks:
      - admin-net
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    deploy:
      placement:
        constraints: [node.role == manager]

networks:
  public-net:
    driver: overlay
  backend-net:
    driver: overlay
  db-net:
    driver: overlay
  admin-net:
    driver: overlay

volumes:
  db_data: