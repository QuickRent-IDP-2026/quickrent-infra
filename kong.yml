_format_version: "3.0"
_transform: true

services:
  - name: auth-service
    url: http://auth-service:8000
    routes:
      - name: auth-route
        paths:
          - /auth
        strip_path: true

  - name: logic-service
    url: http://logic-service:8000
    routes:
      - name: logic-route
        paths:
          - /api
        strip_path: true